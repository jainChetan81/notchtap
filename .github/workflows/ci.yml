name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ci runs exactly what a dev runs locally (IMPLEMENTATION_PLAN.md §4.2) —
# no live network calls; espn is fixture-tested, http via wiremock/oneshot.
jobs:
  rust:
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable branch, pinned (plan 029)
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx biome ci .
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx vite build
      - run: sh -n notchtap

  # compile check only — notchtap-detect's behaviour is hardware-dependent
  # and stays on the manual checklist (TESTING_STRATEGY.md §5)
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: swift build
        working-directory: notchtap-detect
