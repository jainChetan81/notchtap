name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ci runs exactly what a dev runs locally (IMPLEMENTATION_PLAN.md §4.2) —
# no live network calls; espn is fixture-tested, http via wiremock/oneshot.
jobs:
  rust:
    runs-on: macos-latest
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx biome ci .
      - run: npm audit --audit-level=high
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx vite build
      - run: sh -n notchtap

  # compile check only — notchtap-detect's behaviour is hardware-dependent
  # and stays on the manual checklist (TESTING_STRATEGY.md §5)
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift build
        working-directory: notchtap-detect
